<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Inventory Layout (Google Sheets Live Stream)</title>
    <meta name="author" content="Noel Rie N. Deliña">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    
    <script src="https://unpkg.com/imagekit-javascript/dist/imagekit.min.js"></script>

    <style>
        /* [KEEP ALL YOUR EXISTING CSS HERE] */
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f8fafc; }
        .main-container { border: 2px solid #57a1e0; padding: 20px; width: 85%; margin: auto; background-color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-radius: 8px; }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .header-logo { width: 90px; height: 90px; object-fit: contain; }
        .main-title { font-size: 32px; margin: 0; text-transform: uppercase; font-weight: bold; color: #1e293b; }
        .sub-title { font-size: 18px; margin: 5px 0 0 0; color: #475569; }
        .status-banner { background-color: #fff3cd; padding: 12px; border: 1px solid #ffeeba; margin-bottom: 25px; text-align: center; font-weight: bold; color: #856404; border-radius: 4px; }
        .table-section { display: flex; flex-direction: column; width: 100%; }
        .property-table-container { border: 10px solid black; width: 100%; max-height: 550px; overflow: auto; }
        .property-table { width: 100%; border-collapse: collapse; }
        .property-table th, .property-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-box { background-color: white; padding: 25px; border-radius: 8px; width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #57a1e0; }
        .modal-field { margin-bottom: 12px; display: flex; flex-direction: column; }
        .modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 8px 16px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-edit { background-color: #ffc107; }
        .btn-save { background-color: #28a745; color: white; display: none; }
        .btn-close { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <img src="Ph_seal_cebucity.png" alt="Cebu City Seal" class="header-logo" onerror="this.style.display='none'">
            <div class="header-text">
                <h1 class="main-title">REAL ESTATE INVENTORY</h1>
                <p class="sub-title">Property Management Division</p>
            </div>
        </div>

        <div id="statusBanner" class="status-banner">System Canvas Ready. Attempting Live Data Link...</div>

        <div class="table-section">
            <div class="property-table-container">
                <table class="property-table" id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Article</th>
                            <th>Description</th>
                            <th>Acquisition Date</th>
                            <th>Unit Value</th>
                            <th>Remarks</th>
                            <th>Type</th>
                            <th>UPDATED BY</th>
                            <th>LAST UPDATE</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" class="no-data" id="fallbackTableMsg">Awaiting data stream parsing...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">Property Details</div>
            <div id="modalFormContainer"></div>
            
            <div class="modal-field" id="photoUploadGroup" style="display: none; margin-top: 10px;">
                <label for="modalPhotoInput">Attach Survey Gallery Photo:</label>
                <input type="file" id="modalPhotoInput" accept="image/*">
                <small style="color: #64748b; margin-top: 4px;">Uploads automatically via ImageKit.</small>
            </div>

            <div class="modal-actions">
                <button id="modalEditBtn" class="modal-btn btn-edit">Edit Data</button>
                <button id="modalSaveBtn" class="modal-btn btn-save">Save Changes</button>
                <button id="modalCloseBtn" class="modal-btn btn-close">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
