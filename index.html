<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Inventory Layout</title>
    <meta name="author" content="Noel Rie N. Deliña">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f8fafc; }
        .main-container { border: 2px solid #57a1e0; padding: 20px; width: 85%; margin: auto; background-color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-radius: 8px; }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .header-logo { width: 90px; height: 90px; object-fit: contain; }
        .main-title { font-size: 32px; margin: 0; text-transform: uppercase; font-weight: bold; color: #1e293b; }
        .sub-title { font-size: 18px; margin: 5px 0 0 0; color: #475569; }
        .status-banner { background-color: #fff3cd; padding: 12px; border: 1px solid #ffeeba; margin-bottom: 25px; text-align: center; font-weight: bold; color: #856404; border-radius: 4px; }
        .filter-row { display: flex; justify-content: flex-start; gap: 30px; margin-bottom: 25px; padding-left: 10px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; }
        .input-label { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #333; }
        .input-box { font-size: 16px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 250px; }
        .filter-select { font-size: 16px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; min-width: 200px; background-color: white; cursor: pointer; height: 37px; }
        .search-btn { font-size: 16px; padding: 8px 18px; margin-left: 10px; background-color: #57a1e0; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; height: 37px; }
        .dashboard-row { display: flex; justify-content: flex-start; gap: 20px; margin-bottom: 25px; padding-left: 10px; flex-wrap: wrap; }
        .dash-card { background-color: #f8f9fa; border-left: 5px solid #57a1e0; border: 1px solid #e2e8f0; padding: 15px 20px; border-radius: 4px; min-width: 140px; }
        .dash-card.card-existing { border-left-color: #28a745; }
        .dash-card.card-notfound { border-left-color: #dc3545; }
        .dash-card.card-verification { border-left-color: #ffc107; }
        .dash-title { font-size: 13px; font-weight: bold; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
        .dash-value { font-size: 28px; font-weight: bold; color: #1e293b; }
        .table-section { display: flex; flex-direction: column; width: 100%; }
        .property-table-container { border: 10px solid black; width: 100%; max-height: 550px; overflow-y: auto; overflow-x: auto; }
        .property-table { width: 100%; border-collapse: collapse; }
        .property-table th, .property-table td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .property-table th { background-color: #f2f2f2; position: sticky; top: 0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-box { background-color: white; padding: 25px; border-radius: 8px; width: 450px; max-height: 85vh; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #57a1e0; }
        .modal-field { margin-bottom: 12px; display: flex; flex-direction: column; }
        .modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <div class="header-text">
                <h1 class="main-title">REAL ESTATE INVENTORY</h1>
                <p class="sub-title">Property Management Division</p>
            </div>
        </div>

        <div id="statusBanner" class="status-banner">Loading...</div>

        <div class="filter-row">
            <div class="input-group">
                <label class="input-label" for="searchInput">Search:</label>
                <input type="text" id="searchInput" class="input-box" placeholder="Type keywords...">
                <button id="searchButton" class="search-btn">Search</button>
            </div>
            <div class="input-group">
                <label class="input-label" for="remarksFilter">Remarks:</label>
                <select id="remarksFilter" class="filter-select"><option value="ALL">-- All Remarks --</option></select>
            </div>
        </div>

        <div class="dashboard-row">
            <div class="dash-card"><div class="dash-title">Total</div><div id="countTotal" class="dash-value">0</div></div>
            <div class="dash-card card-existing"><div class="dash-title">Existing</div><div id="countExisting" class="dash-value">0</div></div>
            <div class="dash-card card-notfound"><div class="dash-title">Not Found</div><div id="countNotFound" class="dash-value">0</div></div>
        </div>

        <div class="property-table-container">
            <table class="property-table">
                <thead><tr id="tableHeaderRow"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <div id="modalFormContainer"></div>
            <div class="modal-actions">
                <button id="modalEditBtn" class="btn">Edit</button>
                <button id="modalSaveBtn" class="btn" style="display:none;">Save</button>
                <button id="modalCloseBtn" class="btn">Close</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1ndgXDoLL4LoB3YWnSugfYINW5S8ouN8SlVLZsrkH7A8/gviz/tq?tqx=out:csv&gid=0";
        let inventoryData = [];

        async function loadData() {
            const response = await fetch(GOOGLE_SHEET_CSV_URL);
            const data = await response.text();
            Papa.parse(data, {
                header: true,
                complete: (results) => {
                    inventoryData = results.data;
                    renderTable(inventoryData);
                    document.getElementById('statusBanner').textContent = "Connected.";
                }
            });
        }

        function renderTable(data) {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                Object.values(row).forEach(val => {
                    const td = document.createElement('td');
                    td.textContent = val;
                    tr.appendChild(td);
                });
                tb.appendChild(tr);
            });
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
